# nginx.conf — Reverse proxy Open WebUI
# Copier dans /opt/frontend/ sur VM-2 avant de lancer le stack

server {
    listen 80;
    server_name _;

    # Redirection HTTP → HTTPS (décommenter si cert disponible)
    # return 301 https://$host$request_uri;

    client_max_body_size 100M;

    location / {
        proxy_pass http://open-webui:8080;
        proxy_http_version 1.1;

        # WebSocket (nécessaire pour Open WebUI streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout long pour les réponses LLM (streaming)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

