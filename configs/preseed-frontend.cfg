### preseed-frontend.cfg — VM-2 frontend (192.168.20.161) — 50 Go
### Locale & keyboard
d-i debian-installer/locale string fr_FR.UTF-8
d-i keyboard-configuration/xkb-keymap select fr

### Network - static
d-i netcfg/choose_interface select auto
d-i netcfg/disable_autoconfig boolean true
d-i netcfg/get_ipaddress string 192.168.20.161
d-i netcfg/get_netmask string 255.255.255.0
d-i netcfg/get_gateway string 192.168.20.1
d-i netcfg/get_nameservers string 192.168.20.20
d-i netcfg/confirm_static boolean true
d-i netcfg/get_hostname string frontend
d-i netcfg/get_domain string zalin.home

### APT mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string http://192.168.20.35:3142/

### Clock
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Paris
d-i clock-setup/ntp boolean true

### Partitioning — 50 Go (marge ~24% dans le VG)
### Layout disque :
###   sda1   512 Mo   EFI  (fat32, UEFI)
###   sda2     1 Go   /boot (ext4, plain — hors LVM)
###   sda3   reste    LVM PV ~48.5 Go  →  VG: vg-frontend
###     lv-root   15 Go   /
###     lv-docker 20 Go   /var/lib/docker
###     lv-swap    2 Go   swap
###     (libre   ~11.5 Go = 24%  extensible via lvextend)
d-i partman-auto/method string lvm
d-i partman-auto/disk string /dev/sda
d-i partman-auto-lvm/new_vg_name string vg-frontend
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto/expert_recipe string              \
  frontend-lvm ::                                  \
    512 512 512 fat32                              \
      $primary{ }                                  \
      $iflabel{ gpt }                              \
      method{ efi }                                \
      format{ }                                    \
    .                                              \
    1024 1024 1024 ext4                            \
      $primary{ }                                  \
      method{ format } format{ }                   \
      use_filesystem{ }                            \
      filesystem{ ext4 }                           \
      mountpoint{ /boot }                          \
    .                                              \
    1000 1000 -1 lvm                               \
      $primary{ }                                  \
      $defaultignore{ }                            \
      method{ lvm }                                \
      vg_name{ vg-frontend }                       \
    .                                              \
    15360 15360 15360 ext4                         \
      $lvmok{ }                                    \
      lv_name{ lv-root }                           \
      in_vg{ vg-frontend }                         \
      method{ format } format{ }                   \
      use_filesystem{ }                            \
      filesystem{ ext4 }                           \
      mountpoint{ / }                              \
    .                                              \
    20480 20480 20480 ext4                         \
      $lvmok{ }                                    \
      lv_name{ lv-docker }                         \
      in_vg{ vg-frontend }                         \
      method{ format } format{ }                   \
      use_filesystem{ }                            \
      filesystem{ ext4 }                           \
      mountpoint{ /var/lib/docker }                \
    .                                              \
    2048 2048 2048 linux-swap                      \
      $lvmok{ }                                    \
      lv_name{ lv-swap }                           \
      in_vg{ vg-frontend }                         \
      method{ swap } format{ }                     \
    .
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Root account
d-i passwd/root-login boolean true
d-i passwd/root-password-crypted password HASH_TO_REPLACE
d-i passwd/make-user boolean false

### Packages
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string vim htop screen dnsutils curl wget git qemu-guest-agent lvm2
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

### Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string /dev/sda

### Post-install: SSH keys + Docker + Portainer agent
d-i preseed/late_command string \
  in-target mkdir -p /root/.ssh; \
  in-target mkdir -p /etc/apt/apt.conf.d; 
  echo "Acquire::http::Proxy ""http://192.168.20.35:3142"";" > /target/etc/apt/apt.conf.d/01proxy; 
  in-target chmod 700 /root/.ssh; \
  echo 'ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBON8p8hDUuQ0O0FwfDCaoxSDshPlyGa74W+yJFMKzbdU1ct2nhRU+UzCJUt6h5ylBHpg3BUinz2F6YqKz99CJgU= ecdsa-key-20241218' >> /target/root/.ssh/authorized_keys; \
  echo 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKDJHAb3ORUnvY5DnxKt/osJDQZ51eNfVPqbTtX5zr0V claude-mgmt' >> /target/root/.ssh/authorized_keys; \
  echo 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICoMjDdHOj950wDuVfvu23fHlx+YAR3GHL9RtLDaygdq' >> /target/root/.ssh/authorized_keys; \
  in-target chmod 600 /root/.ssh/authorized_keys; \
  in-target sed -i 's/^#*PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config; \
  in-target systemctl enable qemu-guest-agent; \
  in-target curl -fsSL https://get.docker.com -o /tmp/install-docker.sh; \
  in-target sh /tmp/install-docker.sh; \
  in-target systemctl enable docker; \
  in-target mkdir -p /opt/portainer-agent; \
  echo 'services:\n  portainer-agent:\n    image: portainer/agent:latest\n    container_name: portainer-agent\n    restart: always\n    ports:\n      - "9001:9001"\n    volumes:\n      - /var/run/docker.sock:/var/run/docker.sock\n      - /var/lib/docker/volumes:/var/lib/docker/volumes' > /target/opt/portainer-agent/docker-compose.yml; \
  in-target bash -c 'cd /opt/portainer-agent && docker compose up -d' || true; \
  in-target sed -i 's/^GRUB_CMDLINE_LINUX=.*/GRUB_CMDLINE_LINUX="console=tty0 console=ttyS0,115200n8"/' /etc/default/grub; \
  echo 'GRUB_TERMINAL="serial console"' >> /target/etc/default/grub; \
  echo 'GRUB_SERIAL_COMMAND="serial --speed=115200 --unit=0 --word=8 --parity=no --stop=1"' >> /target/etc/default/grub; \
  in-target update-grub; \
  wget -q --no-check-certificate --method=PUT --header="Authorization: PVEAPIToken=root@pam!installer-cleanup=832da5fc-b0d8-48a7-a537-1137c1be4cdd" --header="Content-Type: application/x-www-form-urlencoded" --body-data="ide2=none&boot=order%3Dscsi0" -O /dev/null "https://192.168.20.1:8006/api2/json/nodes/pve2/qemu/101/config" && echo "PVE: boot order fixe" || echo "PVE: API skip"

### Auto reboot
d-i finish-install/reboot_in_progress note
