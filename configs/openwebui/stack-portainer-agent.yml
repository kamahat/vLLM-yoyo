# Portainer Stack — Agent Portainer
# A déployer sur CHAQUE VM (inference, frontend, rag)
# Permet à Portainer (192.168.20.91:9443) de gérer les conteneurs
#
# Déployer via Portainer → Environments → Add Environment → Agent
# ou manuellement : docker compose -f stack-portainer-agent.yml up -d

services:
  portainer-agent:
    image: portainer/agent:latest
    container_name: portainer-agent
    restart: always
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    environment:
      - AGENT_CLUSTER_ADDR=tasks.portainer-agent
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge
